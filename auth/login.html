<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Mago do Pism</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Quicksand:wght@500;600;700&family=Nunito+Sans:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/tokens.css" />
  <style>
    body {
      min-height: 100vh;
      background: var(--neutral-0);
      display: grid;
      grid-template-columns: minmax(0, 926fr) minmax(0, 514fr);
    }
    @media (max-width: 900px) {
      body { grid-template-columns: 1fr; }
      .auth-hero { display: none; }
    }
    .auth-hero {
      position: relative;
      background:
        linear-gradient(rgba(14,147,242,0.6), rgba(14,147,242,0.6)),
        url("../assets/login-bg.jpg") center / cover no-repeat;
      min-height: 100vh;
    }
    .auth-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top, rgba(255,255,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .auth-pane {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 40px;
    }
    .auth-form {
      width: 100%;
      max-width: 364px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    .auth-logo {
      width: 250px;
      height: 200px;
      background: url("../assets/logo-azul.png") center / contain no-repeat;
      margin-bottom: 30px;
    }
    .auth-form .input { width: 100%; }
    .auth-form .btn-primary { width: 100%; }
    .auth-link {
      align-self: flex-end;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.5px;
      color: var(--text-muted);
      transition: color 0.15s ease;
    }
    .auth-link:hover { color: var(--brand-blue); }
    .field-group { display: flex; flex-direction: column; gap: 14px; width: 100%; }

    /* "LOGAR" wordmark — Quicksand 700 — placed centered above hero on mobile fallback */
    .hero-tag {
      position: absolute;
      bottom: 48px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: "Quicksand", sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.8px;
      color: white;
      opacity: 0.85;
    }

    .back-home {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      padding: 8px 14px;
      background: rgba(255,255,255,0.92);
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-soft);
      font-size: 13px;
      font-weight: 600;
      color: var(--brand-blue);
    }
  </style>
</head>
<body>

  <div class="auth-hero">
    <div class="hero-tag">LOGAR</div>
  </div>

  <div class="auth-pane">
    <form class="auth-form" onsubmit="event.preventDefault();">
      <div class="auth-logo" role="img" aria-label="Mago do Pism"></div>
      <div class="field-group">
        <input class="input" type="email" placeholder="E-mail" autocomplete="email" />
        <input class="input" type="password" placeholder="Senha" autocomplete="current-password" />
      </div>
      <button class="btn-primary" type="submit">Entrar</button>
      <a href="forgot-1.html" class="auth-link">Esqueci a senha</a>
    </form>
  </div>
</body>
</html>
