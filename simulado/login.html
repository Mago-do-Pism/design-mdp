<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Simulado · Mago do Pism</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Quicksand:wght@500;600;700&family=Nunito+Sans:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/simulado.css" />
</head>
<body>

<main class="sim-login">
  <div class="sim-login-image" style="background-image: linear-gradient(rgba(14,147,242,0.6),rgba(14,147,242,0.6)), url('../assets/simulado-login-bg.jpg');"></div>
  <div class="sim-login-form">
    <div class="sim-login-card">
      <div class="sim-login-logo">
        <img src="../assets/logo-azul.png" alt="Mago do Pism" />
        <span>Simulados</span>
      </div>
      <label class="field">
        <span class="field-label">E-mail</span>
        <input type="email" placeholder="seu@email.com" />
      </label>
      <button class="sim-btn primary">ENTRAR</button>
      <button class="sim-btn ghost">LOGAR</button>
    </div>
  </div>
</main>
</body>
</html>
