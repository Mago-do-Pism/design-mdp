<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Início · Simulado · Mago do Pism</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/simulado.css" />
</head>
<body>

  <header class="sim-header">
    <div class="sim-header-inner is-center">
      <a href="login.html" class="sim-logo" aria-label="Mago do Pism — Simulados">
        <img src="../assets/logo-azul.png" alt="" />
        <span>Simulados</span>
      </a>
      
    </div>
  </header>

<main class="sim-screen">
  <div class="sim-card briefing">
    <h1 class="briefing-title">ESSE É O SIMULADO COMPLETO DO ENEM</h1>
    <ul class="briefing-list">
      <li>45 Questões de Naturezas</li>
      <li>45 Questões de Matemática</li>
    </ul>
    <p class="briefing-meta">✨ <strong>Data de entrega:</strong> 22/07/2024 até as 23:59</p>
    <p class="briefing-meta">✨ <strong>Liberação da NOTA</strong> com análise de TRI: 26/07</p>
    <p class="briefing-cta">BOM SIMULADO A TODOS!</p>

    <label class="field">
      <span class="field-label">Nome completo</span>
      <input type="text" placeholder="Digite aqui" />
    </label>
    <label class="field">
      <span class="field-label">E-mail</span>
      <input type="email" placeholder="Digite seu e-mail" />
    </label>

    <div class="sim-checkbox-row">
      <label class="sim-checkbox">
        <input type="checkbox" checked />
        <span class="checkmark"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
        <div>
          <strong>Modo Bruxo</strong>
          <em>No modo bruxo, você terá um cronômetro que marcará o tempo até o fim da prova. Mas não se preocupe, a sua prova não acabará caso não faça a tempo.</em>
        </div>
      </label>
    </div>
    <p class="briefing-tip">💡 Entre com o mesmo e-mail do curso</p>

    <a href="exam.html" class="sim-btn primary block">Começar</a>
  </div>
</main>
</body>
</html>
