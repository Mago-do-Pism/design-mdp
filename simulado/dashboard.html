<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · Simulado · Mago do Pism</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/simulado.css" />
</head>
<body>

  <header class="sim-header">
    <div class="sim-header-inner ">
      <a href="login.html" class="sim-logo" aria-label="Mago do Pism — Simulados">
        <img src="../assets/logo-azul.png" alt="" />
        <span>Simulados</span>
      </a>
      
  <div class="sim-user">
    <div class="sim-user-avatar"></div>
    <div>
      <div class="sim-user-name">Vinicius Carvalho</div>
      <div class="sim-user-mail">miquelaovinicius@gmail.com</div>
    </div>
  </div>
    </div>
  </header>

<main class="sim-screen sim-dashboard">
  <p class="sim-eyebrow">Desempenho</p>
  <section class="sim-chart-card">
    <svg viewBox="0 0 600 360" class="sim-chart" aria-hidden="true">
      <!-- y axis labels -->
      <g class="axis">
        <text x="20" y="40">80</text>
        <text x="20" y="100">60</text>
        <text x="20" y="160">40</text>
        <text x="20" y="220">20</text>
        <text x="20" y="280">0</text>
      </g>
      <!-- horizontal grid -->
      <g stroke="#EAEAEA" stroke-dasharray="4 6">
        <line x1="44" y1="40" x2="580" y2="40"/>
        <line x1="44" y1="100" x2="580" y2="100"/>
        <line x1="44" y1="160" x2="580" y2="160"/>
        <line x1="44" y1="220" x2="580" y2="220"/>
        <line x1="44" y1="280" x2="580" y2="280"/>
      </g>
      <!-- line -->
      <path d="M 130 130 L 310 70 L 490 100" fill="none" stroke="#0E93F2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      <!-- nodes -->
      <g>
        <circle cx="130" cy="130" r="6" fill="white" stroke="#0E93F2" stroke-width="3"/>
        <circle cx="310" cy="70" r="6" fill="white" stroke="#0E93F2" stroke-width="3"/>
        <circle cx="490" cy="100" r="6" fill="white" stroke="#0E93F2" stroke-width="3"/>
      </g>
      <!-- value labels -->
      <g class="data-label">
        <text x="130" y="115">50</text>
        <text x="310" y="55">70</text>
        <text x="490" y="85">60</text>
      </g>
      <!-- x labels -->
      <g class="x-label">
        <text x="130" y="320">Simulado Outubro</text>
        <text x="310" y="320">Simulado Novembro</text>
        <text x="490" y="320">Simulado Dezembro</text>
      </g>
    </svg>
    <div class="sim-chart-legend">
      <span class="dot"></span>
      % da nota
    </div>
  </section>

  <h2 class="sim-section-title">Simulados</h2>
  <div class="sim-grid">
    <a href="exam.html" class="sim-tile active">
      <div class="sim-tile-tag">Em andamento</div>
      <div class="sim-tile-title">Simulado Outubro</div>
      <div class="sim-tile-meta">15/12 questões respondidas</div>
      <div class="sim-tile-bar"><span style="width:60%"></span></div>
    </a>
    <a href="review.html" class="sim-tile finished">
      <div class="sim-tile-tag finished">Finalizado</div>
      <div class="sim-tile-title">Simulado Setembro</div>
      <div class="sim-tile-meta">Nota 70 · TRI 685</div>
      <div class="sim-tile-bar"><span style="width:100%"></span></div>
    </a>
  </div>
</main>
</body>
</html>
