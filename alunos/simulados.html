<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simulados · Aluno · Mago do Pism</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Quicksand:wght@500;600;700&family=Nunito+Sans:wght@400;600;700&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/platform.css" />
  <style>
    .chart-card {
      background: var(--neutral-0);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      padding: 28px 28px 18px;
      max-width: 880px;
    }
    .chart-card h3 {
      font-family: var(--font-akagi);
      font-weight: 600;
      font-size: 16px;
      color: var(--text-secondary);
      margin: 0 0 18px;
      letter-spacing: 0.3px;
    }
    .chart {
      width: 100%;
      height: 320px;
      display: block;
    }
    .legend {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 16px;
      font-family: var(--font-akagi);
      font-size: 12px;
      color: rgba(0,0,0,0.7);
      letter-spacing: 0.3px;
    }
    .legend .swatch {
      width: 16px; height: 16px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .legend .swatch::before { content: ""; width: 16px; height: 2px; background: var(--brand-blue); display: block; }
    .legend .swatch::after {
      content: ""; width: 8px; height: 8px; border-radius: 50%;
      background: var(--brand-blue); border: 1px solid var(--neutral-50);
      position: absolute; transform: translate(-12px, 0);
    }

    .simulator-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      max-width: 880px;
    }
    .sim-card {
      background: var(--neutral-0);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      padding: 24px 26px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
    }
    .sim-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-card); }
    .sim-card.is-finished { background: var(--neutral-150); }
    .sim-head { display: flex; align-items: center; justify-content: space-between; }
    .sim-name {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 18px;
      color: var(--text-primary);
      margin: 0;
    }
    .sim-status {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
    }
    .sim-status.live {
      background: rgba(14,147,242,0.10);
      color: var(--brand-blue);
    }
    .sim-status.done {
      background: rgba(39,133,86,0.10);
      color: var(--color-success);
    }
    .sim-meta {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      gap: 14px;
    }
    .sim-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid var(--border-default);
    }
    .sim-score {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      color: var(--brand-blue);
    }
    .sim-card.is-finished .sim-score { color: var(--color-success); }
    .btn-link {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 13px;
      color: var(--brand-blue);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo" role="img" aria-label="Mago do Pism"></div>
      <nav class="sidebar-nav">
        <a href="inicio.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg><span>Início</span></a>
        <a href="cursos.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg><span>Cursos</span></a>
        <a href="simulados.html" class="sidebar-item is-active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg><span>Simulados</span></a>
        <a href="#" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg><span>Listas</span></a>
        <a href="#" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M14 9c-.5-1-1.5-1.5-2.5-1.5S9 8 9 9.5s1 2 2.5 2.5 2.5 1 2.5 2.5-1 2-2.5 2-2-.5-2.5-1.5"/></svg><span>Financeiro</span></a>
      </nav>
      <div class="sidebar-foot">
        <a href="#" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 015 0c0 1.5-2.5 2-2.5 3.5"/></svg><span>Ajuda</span></a>
        <a href="perfil.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg><span>Meu Perfil</span></a>
      </div>
    </aside>

    <main class="content">
      <h2 class="section-title">Desempenho</h2>

      <div class="chart-card">
        <h3>% da nota — últimos 4 simulados</h3>
        <svg class="chart" viewBox="0 0 600 320" preserveAspectRatio="none">
          <!-- Y axis labels -->
          <g font-family="Roboto Mono, monospace" font-size="10" fill="#a0a0a0">
            <text x="22" y="20" text-anchor="end">100</text>
            <text x="22" y="80" text-anchor="end">80</text>
            <text x="22" y="140" text-anchor="end">60</text>
            <text x="22" y="200" text-anchor="end">40</text>
            <text x="22" y="260" text-anchor="end">20</text>
            <text x="22" y="304" text-anchor="end">0</text>
          </g>
          <!-- Grid -->
          <g stroke="#ebebeb" stroke-width="1">
            <line x1="32" y1="16" x2="592" y2="16"/>
            <line x1="32" y1="76" x2="592" y2="76"/>
            <line x1="32" y1="136" x2="592" y2="136"/>
            <line x1="32" y1="196" x2="592" y2="196"/>
            <line x1="32" y1="256" x2="592" y2="256"/>
            <line x1="32" y1="300" x2="592" y2="300"/>
          </g>
          <!-- X dividers -->
          <g stroke="#ebebeb" stroke-width="1" stroke-dasharray="3 3">
            <line x1="172" y1="16" x2="172" y2="300"/>
            <line x1="312" y1="16" x2="312" y2="300"/>
            <line x1="452" y1="16" x2="452" y2="300"/>
          </g>
          <!-- Line: 50%, 70%, 60%, 78% (mapped) -->
          <polyline fill="none" stroke="#0E93F2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
            points="100,164 240,104 380,140 520,75" />
          <!-- Nodes -->
          <g>
            <circle cx="100" cy="164" r="6" fill="#0E93F2" stroke="#fcfcfc" stroke-width="2"/>
            <circle cx="240" cy="104" r="6" fill="#0E93F2" stroke="#fcfcfc" stroke-width="2"/>
            <circle cx="380" cy="140" r="6" fill="#0E93F2" stroke="#fcfcfc" stroke-width="2"/>
            <circle cx="520" cy="75"  r="6" fill="#0E93F2" stroke="#fcfcfc" stroke-width="2"/>
          </g>
          <!-- Data labels -->
          <g font-family="Nunito Sans, sans-serif" font-weight="700" font-size="11" fill="#0E93F2">
            <text x="100" y="150" text-anchor="middle">50</text>
            <text x="240" y="90"  text-anchor="middle">70</text>
            <text x="380" y="126" text-anchor="middle">60</text>
            <text x="520" y="61"  text-anchor="middle">78</text>
          </g>
          <!-- X labels -->
          <g font-family="Roboto Mono, monospace" font-size="10" fill="#757575">
            <text x="100" y="316" text-anchor="middle">Simulado Set</text>
            <text x="240" y="316" text-anchor="middle">Simulado Out</text>
            <text x="380" y="316" text-anchor="middle">Simulado Nov</text>
            <text x="520" y="316" text-anchor="middle">Simulado Dez</text>
          </g>
        </svg>
        <div class="legend">
          <span class="swatch"></span>
          <span>% da nota</span>
        </div>
      </div>

      <h2 class="section-title">Simulados</h2>
      <div class="simulator-row">
        <article class="sim-card">
          <div class="sim-head">
            <p class="sim-name">Simulado Outubro</p>
            <span class="sim-status live">Em andamento</span>
          </div>
          <p class="sim-meta">120 questões · 4h · até 15/out</p>
          <div class="sim-foot">
            <span class="sim-score">—</span>
            <span class="btn-link">Continuar →</span>
          </div>
        </article>
        <article class="sim-card is-finished">
          <div class="sim-head">
            <p class="sim-name">Simulado Setembro</p>
            <span class="sim-status done">Finalizado</span>
          </div>
          <p class="sim-meta">120 questões · 4h · concluído em 30/set</p>
          <div class="sim-foot">
            <span class="sim-score">70%</span>
            <span class="btn-link">Ver gabarito →</span>
          </div>
        </article>
      </div>
    </main>
  </div>
</body>
</html>
