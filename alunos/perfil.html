<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meu Perfil · Mago do Pism</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Quicksand:wght@500;600;700&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/platform.css" />
  <style>
    .profile-grid {
      display: grid;
      grid-template-columns: minmax(0, 320px) minmax(0, 1fr);
      gap: 56px;
      align-items: start;
      max-width: 880px;
    }
    @media (max-width: 900px) { .profile-grid { grid-template-columns: 1fr; gap: 32px; } }
    .avatar-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 18px;
      padding: 24px 18px;
    }
    .avatar {
      width: 160px; height: 160px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1686D8, #0E93F2);
      display: flex; align-items: center; justify-content: center;
      color: white;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 56px;
      position: relative;
      box-shadow: var(--shadow-soft);
    }
    .avatar-edit {
      position: absolute;
      right: 0; bottom: 8px;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: white;
      color: var(--brand-blue);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
    }
    .avatar-edit svg { width: 18px; height: 18px; }
    .avatar-name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 22px;
      color: var(--neutral-900);
      margin: 0;
      text-align: center;
    }
    .avatar-role {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-muted);
      margin: 0;
    }

    .profile-section { margin-bottom: 36px; }
    .profile-section h3 {
      font-family: var(--font-akagi);
      font-weight: 600;
      font-size: 18px;
      color: var(--brand-blue);
      margin: 0 0 18px;
      letter-spacing: 0.3px;
    }
    .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
    .field-label {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
    }
    .danger-link {
      color: var(--color-danger);
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.4px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
    }
    .actions {
      display: flex;
      gap: 14px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .btn-primary.full { min-width: 220px; }
  </style>
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo" role="img" aria-label="Mago do Pism"></div>
      <nav class="sidebar-nav">
        <a href="inicio.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg><span>Início</span></a>
        <a href="cursos.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg><span>Cursos</span></a>
        <a href="simulados.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg><span>Simulados</span></a>
        <a href="#" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg><span>Listas</span></a>
        <a href="#" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M14 9c-.5-1-1.5-1.5-2.5-1.5S9 8 9 9.5s1 2 2.5 2.5 2.5 1 2.5 2.5-1 2-2.5 2-2-.5-2.5-1.5"/></svg><span>Financeiro</span></a>
      </nav>
      <div class="sidebar-foot">
        <a href="#" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 015 0c0 1.5-2.5 2-2.5 3.5"/></svg><span>Ajuda</span></a>
        <a href="perfil.html" class="sidebar-item is-active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg><span>Meu Perfil</span></a>
      </div>
    </aside>

    <main class="content">
      <div class="profile-grid">
        <div class="avatar-wrap">
          <div class="avatar">
            VC
            <button class="avatar-edit" aria-label="Editar foto">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
            </button>
          </div>
          <div>
            <p class="avatar-name">Vitor Augusto Caires</p>
            <p class="avatar-role">Aluno · Pism II — T3</p>
          </div>
        </div>

        <form onsubmit="event.preventDefault();">
          <section class="profile-section">
            <h3>Dados pessoais</h3>
            <div class="field">
              <label class="field-label" for="nome">Nome completo</label>
              <input class="input" id="nome" value="Vitor Augusto Caires" />
            </div>
            <div class="field">
              <label class="field-label" for="email">E-mail</label>
              <input class="input" id="email" type="email" value="vitorcaires10@gmail.com" />
            </div>
          </section>

          <section class="profile-section">
            <h3>Segurança</h3>
            <div class="field">
              <label class="field-label" for="cur">Senha atual</label>
              <input class="input" id="cur" type="password" placeholder="Digite sua senha atual" />
            </div>
            <div class="field">
              <label class="field-label" for="new">Nova senha</label>
              <input class="input" id="new" type="password" placeholder="Digite sua nova senha" />
            </div>
            <div class="actions">
              <button class="btn-primary full" type="submit">Alterar senha</button>
            </div>
            <a href="../auth/login.html" class="danger-link">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
              Sair da conta
            </a>
          </section>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
