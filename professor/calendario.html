<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />

  <title>Calendário · Professor · Mago do Pism</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/tokens.css" />

  <style>
    a { color: inherit; text-decoration: none; }
    .cal-toolbar { display:flex; align-items:center; gap:14px; margin-bottom:24px; flex-wrap:wrap; }
    .cal-nav-btn { width:36px; height:36px; border-radius:8px; border:1px solid var(--border-default); background:var(--neutral-0); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-secondary); }
    .cal-nav-btn:hover { border-color:var(--brand-blue); color:var(--brand-blue); }
    .cal-nav-btn svg { width:18px; height:18px; }
    .cal-week-label { font-weight:600; font-size:16px; color:var(--text-primary); }

    .cal-outer { background:var(--neutral-0); border-radius:var(--radius-xl); box-shadow:var(--shadow-soft); overflow:auto; flex:1; }
    .cal-head { display:grid; grid-template-columns:56px repeat(6,1fr); border-bottom:1px solid var(--border-default); position:sticky; top:0; z-index:10; background:var(--neutral-0); }
    .cal-head-cell { padding:14px 8px 12px; text-align:center; font-size:13px; font-weight:600; color:var(--text-muted); }
    .cal-head-cell .day-num { display:block; width:34px; height:34px; border-radius:50%; line-height:34px; margin:4px auto 0; font-size:15px; font-weight:700; color:var(--text-primary); }
    .cal-head-cell.today { color:var(--brand-blue); }
    .cal-head-cell.today .day-num { background:var(--brand-blue); color:white; }

    .cal-body { display:grid; grid-template-columns:56px repeat(6,1fr); min-width:700px; }
    .cal-time-col { border-right:1px solid var(--border-default); }
    .cal-time-slot { height:70px; display:flex; align-items:flex-start; justify-content:flex-end; padding:6px 10px 0 0; font-size:11px; font-weight:500; color:var(--text-muted); border-bottom:1px solid var(--neutral-200); box-sizing:border-box; }
    .cal-day-col { position:relative; border-right:1px solid var(--border-default); }
    .cal-day-col:last-child { border-right:0; }
    .cal-hour-line { height:70px; border-bottom:1px solid var(--neutral-200); box-sizing:border-box; }
    .cal-day-col.today-col { background:rgba(39,133,86,0.025); }

    .cal-event { position:absolute; left:4px; right:4px; border-radius:8px; padding:8px 10px; cursor:pointer; overflow:hidden; transition:filter .15s; }
    .cal-event:hover { filter:brightness(0.92); }
    .cal-event-name { font-size:12px; font-weight:700; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
    .cal-event-sub { font-size:11px; color:rgba(255,255,255,0.78); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cal-event-badge { display:inline-block; margin-top:4px; padding:2px 7px; border-radius:4px; background:rgba(255,255,255,0.22); font-size:10px; font-weight:700; color:white; letter-spacing:0.5px; text-transform:uppercase; }
    .ev-green { background:var(--brand-blue); }
    @keyframes pulse-ring { 0%{box-shadow:0 0 0 0 rgba(14,147,242,0.5)} 70%{box-shadow:0 0 0 8px rgba(14,147,242,0)} 100%{box-shadow:0 0 0 0 rgba(14,147,242,0)} }
    .ev-live { animation: pulse-ring 1.8s infinite; }

    /* Start button inside event */
    .ev-start-btn {
      display:block; margin-top:7px; width:100%; padding:4px 0;
      border-radius:5px; border:none; background:rgba(255,255,255,0.22);
      font-family:var(--font-body); font-size:10px; font-weight:700;
      color:white; cursor:pointer; text-align:center; letter-spacing:0.3px;
    }
    .ev-start-btn:hover { background:rgba(255,255,255,0.35); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
