<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calendário · Admin · Mago do Pism</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/platform.css" />
  <link rel="stylesheet" href="../styles/admin.css" />
  <style>
    a { color: inherit; text-decoration: none; }
    a:hover { color: inherit; }

    .cal-toolbar { display:flex; align-items:center; gap:14px; margin-bottom:24px; flex-wrap:wrap; }
    .cal-nav-btn { width:36px; height:36px; border-radius:8px; border:1px solid var(--border-default); background:var(--neutral-0); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-secondary); }
    .cal-nav-btn:hover { border-color:var(--brand-blue); color:var(--brand-blue); }
    .cal-nav-btn svg { width:18px; height:18px; }
    .cal-week-label { font-weight:600; font-size:16px; color:var(--text-primary); }
    .cal-filter { display:flex; gap:8px; align-items:center; }
    .cal-filter select { height:36px; padding:0 10px; border-radius:8px; border:1px solid var(--border-default); font-family:var(--font-body); font-size:13px; color:var(--text-primary); background:var(--neutral-0); outline:none; }
    .cal-filter select:focus { border-color:var(--brand-blue); }

    .cal-outer { background:var(--neutral-0); border-radius:var(--radius-xl); box-shadow:var(--shadow-soft); overflow:auto; }
    .cal-head { display:grid; grid-template-columns:64px repeat(7,1fr); border-bottom:1px solid var(--border-default); position:sticky; top:0; z-index:10; background:var(--neutral-0); }
    .cal-head-cell { padding:14px 8px 12px; text-align:center; font-size:13px; font-weight:600; color:var(--text-muted); }
    .cal-head-cell .day-num { display:block; width:34px; height:34px; border-radius:50%; line-height:34px; margin:4px auto 0; font-size:15px; font-weight:700; color:var(--text-primary); }
    .cal-head-cell.today { color:var(--brand-blue); }
    .cal-head-cell.today .day-num { background:var(--brand-blue); color:white; }

    .cal-body { display:grid; grid-template-columns:64px repeat(7,1fr); min-width:800px; }
    .cal-time-col { border-right:1px solid var(--border-default); }
    .cal-time-slot { height:70px; display:flex; align-items:flex-start; justify-content:flex-end; padding:6px 10px 0 0; font-size:11px; font-weight:500; color:var(--text-muted); border-bottom:1px solid var(--neutral-200); box-sizing:border-box; }
    .cal-day-col { position:relative; border-right:1px solid var(--border-default); }
    .cal-day-col:last-child { border-right:0; }
    .cal-hour-line { height:70px; border-bottom:1px solid var(--neutral-200); box-sizing:border-box; }
    .cal-day-col.today-col { background:rgba(14,147,242,0.025); }

    .cal-event { position:absolute; left:4px; right:4px; border-radius:8px; padding:7px 10px; cursor:pointer; overflow:hidden; transition:filter .15s; }
    .cal-event:hover { filter:brightness(0.92); }
    .cal-event-name { font-size:12px; font-weight:700; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
    .cal-event-sub { font-size:11px; color:rgba(255,255,255,0.78); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cal-event-prof { font-size:10px; color:rgba(255,255,255,0.60); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cal-event-badge { display:inline-block; margin-top:4px; padding:2px 7px; border-radius:4px; background:rgba(255,255,255,0.22); font-size:10px; font-weight:700; color:white; letter-spacing:0.5px; text-transform:uppercase; }

    .ev-blue   { background:var(--brand-blue); }
    .ev-green  { background:#278556; }
    .ev-purple { background:#7c3aed; }
    .ev-orange { background:#d97706; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .ev-live { animation: pulse-ring 1.8s infinite; }
    @keyframes pulse-ring { 0%{box-shadow:0 0 0 0 rgba(14,147,242,0.5)} 70%{box-shadow:0 0 0 8px rgba(14,147,242,0)} 100%{box-shadow:0 0 0 0 rgba(14,147,242,0)} }

    /* Edit tooltip on hover */
    .cal-event-actions { display:none; position:absolute; top:6px; right:6px; gap:4px; }
    .cal-event:hover .cal-event-actions { display:flex; }
    .ev-action-btn { width:22px; height:22px; border-radius:4px; background:rgba(255,255,255,0.25); border:none; color:white; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .ev-action-btn svg { width:12px; height:12px; }

    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.40); z-index:100; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--neutral-0); border-radius:var(--radius-xl); padding:32px; width:520px; max-width:95vw; box-shadow:var(--shadow-deep); transform:translateY(12px); transition:transform .2s; }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-title { font-weight:700; font-size:18px; color:var(--text-primary); margin:0 0 24px; }
    .modal-form { display:flex; flex-direction:column; gap:16px; }
    .modal-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .modal-field { display:flex; flex-direction:column; gap:6px; }
    .modal-field label { font-size:13px; font-weight:600; color:var(--text-muted); }
    .modal-field input, .modal-field select { height:42px; padding:0 12px; border-radius:8px; border:1px solid var(--border-default); font-family:var(--font-body); font-size:14px; color:var(--text-primary); background:var(--neutral-50); outline:none; }
    .modal-field input:focus, .modal-field select:focus { border-color:var(--brand-blue); }
    .modal-actions { display:flex; gap:12px; justify-content:flex-end; margin-top:8px; }
    .btn-cancel { padding:0 20px; height:40px; border-radius:8px; border:1px solid var(--border-default); background:var(--neutral-0); font-family:var(--font-body); font-weight:600; font-size:14px; color:var(--text-secondary); cursor:pointer; }
    .btn-save { padding:0 24px; height:40px; border-radius:8px; border:none; background:var(--brand-blue); font-family:var(--font-body); font-weight:700; font-size:14px; color:white; cursor:pointer; }
    .btn-save:hover { background:var(--brand-blue-dark); }
  </style>
</head>

    const TURMA_LABELS = {
      pism1t1: 'Extensivo PISM I — T1',
      pism1t2: 'Extensivo PISM I — T2',
      pism2t3: 'Extensivo PISM II — T3',
      pismenem: 'Extensivo PISM/ENEM — T1',
    };

    function fmt(h) {
      const hh = Math.floor(h);
      const mm = Math.round((h - hh) * 60);
      return String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
    }

    function renderEvents(turma) {
      // clear existing events from all cols
      for (let i = 0; i < 6; i++) {
        const col = document.getElementById('col-'+i);
        col.querySelectorAll('.cal-event').forEach(e => e.remove());
      }
      const events = TURMA_EVENTS[turma] || [];
      const label = TURMA_LABELS[turma] || turma;
      events.forEach(ev => {
        const col = document.getElementById('col-'+ev.col);
        const top = (ev.startH - 8) * 70;
        const height = ev.durH * 70 - 6;
        const endH = ev.startH + ev.durH;
        const div = document.createElement('div');
        div.className = 'cal-event ev-blue' + (ev.live ? ' ev-live' : '');
        div.style.cssText = 'top:'+top+'px;height:'+height+'px;';
        div.onclick = openModal;
        div.innerHTML = `
          <div class="cal-event-name">${label}</div>
          <div class="cal-event-sub">${fmt(ev.startH)}–${fmt(endH)}</div>
          <div class="cal-event-prof">${ev.prof}</div>
          ${ev.live ? '<div class="cal-event-badge">● ao vivo</div>' : ''}
        `;
        col.appendChild(div);
      });
    }

    function selectTurma(val) {
      document.getElementById('emptyState').style.display = val ? 'none' : 'flex';
      const cv = document.getElementById('calView');
      cv.style.display = val ? 'flex' : 'none';
      if (val) renderEvents(val);
    }
    function openModal(){ document.getElementById('modalOverlay').classList.add('open'); }
    function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
