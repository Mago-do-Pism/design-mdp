    <main class="content admin-content">
      <h2 class="section-title">Meu Perfil</h2>

      <div class="profile-tabs" style="display:flex; gap:32px; border-bottom:1px solid var(--border-default); margin-bottom:36px; max-width:520px;">
        <button class="profile-tab is-active">Foto de Perfil</button>
        <button class="profile-tab">Dados pessoais</button>
        <button class="profile-tab">Segurança</button>
      </div>

      <form class="profile-form">
        <div class="profile-photo">
          <div class="avatar-stack">
            <div class="avatar-blob" style="background-image:url('../assets/colab-1.png')"></div>
            <button type="button" class="avatar-edit" aria-label="Trocar foto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg></button>
          </div>
        </div>

        <label class="field">
          <span class="field-label">Nome completo</span>
          <input type="text" value="Vitor Augusto Caires" />
        </label>

        <label class="field">
          <span class="field-label">E-mail</span>
          <input type="email" value="vitorcaires10@gmail.com" disabled />
        </label>

        <h3 class="form-section-title">Segurança</h3>

        <label class="field">
          <span class="field-label">Senha atual</span>
          <input type="password" placeholder="Digite sua senha atual" />
        </label>

        <label class="field">
          <span class="field-label">Nova senha</span>
          <input type="password" placeholder="Digite sua nova senha" />
        </label>

        <button type="button" class="btn-primary" style="width:316px; height:50px; margin-top:14px;">Alterar senha</button>
        <button type="button" class="btn-text-danger" style="margin-top:14px;">Sair da conta</button>
      </form>
    </main>
  </div>
</body>
</html>
