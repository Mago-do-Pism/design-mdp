<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Publicar Conteúdo · Admin · Mago do Pism</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/platform.css" />
  <link rel="stylesheet" href="../styles/admin.css" />
  <style>
    a { color: inherit; text-decoration: none; }

    /* Preview da gravação — reaproveita o visual de .rec-thumb de gravacoes.html */
    .rec-thumb {
      aspect-ratio: 16/9;
      background: repeating-linear-gradient(
        135deg,
        #1a2235 0 18px,
        #1e2d42 18px 36px
      );
      border-radius: var(--radius-xl);
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .rec-thumb-play {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(14,147,242,0.85);
      display: flex; align-items: center; justify-content: center;
    }
    .rec-thumb-play svg { width: 26px; height: 26px; color: white; margin-left: 3px; }
    .rec-thumb-dur {
      position: absolute; bottom: 12px; right: 14px;
      background: rgba(0,0,0,0.65); color: white;
      font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .rec-thumb-date {
      position: absolute; top: 12px; left: 14px;
      background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.85);
      font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 4px;
    }

    .rec-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .rec-tag {
      display: inline-flex; align-items: center;
      padding: 3px 9px; border-radius: 5px;
      font-size: 11px; font-weight: 600;
    }
    .rec-tag.blue { background: rgba(14,147,242,0.10); color: var(--brand-blue); }
    .rec-tag.draft { background: rgba(160,160,160,0.14); color: var(--text-muted); }
    .rec-prof { font-size: 12px; color: var(--text-muted); }

    .pub-layout {
      display: grid;
      grid-template-columns: minmax(320px, 480px) 1fr;
      gap: 48px;
      max-width: 1180px;
      align-items: start;
    }
    @media (max-width: 900px) { .pub-layout { grid-template-columns: 1fr; } }

    .pub-preview-card {
      background: var(--neutral-0);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }
    .pub-preview-body { padding: 18px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
    .pub-preview-title { font-weight: 700; font-size: 17px; color: var(--text-primary); margin: 0; }

    .pub-form { display: flex; flex-direction: column; gap: 20px; max-width: 560px; }
    .pub-field { display: flex; flex-direction: column; gap: 7px; }
    .pub-field label { font-size: 13px; font-weight: 600; color: var(--text-muted); }
    .pub-field input, .pub-field select, .pub-field textarea {
      padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border-default);
      font-family: var(--font-body); font-size: 14px; color: var(--text-primary);
      background: var(--neutral-50); outline: none; width: 100%;
    }
    .pub-field input:focus, .pub-field select:focus, .pub-field textarea:focus { border-color: var(--brand-blue); }
    .pub-field textarea { min-height: 90px; resize: vertical; }

    .attach-area {
      border: 2px dashed var(--border-default); border-radius: 10px;
      padding: 20px; text-align: center; color: var(--text-muted);
      font-size: 13px; cursor: pointer; transition: border-color .15s;
    }
    .attach-area:hover { border-color: var(--brand-blue); }
    .attach-area svg { width: 28px; height: 28px; margin-bottom: 8px; display: block; margin-inline: auto; }

    .pub-actions {
      display: flex; gap: 10px; justify-content: flex-end;
      padding-top: 16px; margin-top: 4px; border-top: 1px solid var(--border-default);
    }
    .btn-cancel {
      padding: 0 20px; height: 42px; border-radius: 8px; border: 1px solid var(--border-default);
      background: transparent; font-family: var(--font-body); font-weight: 600; font-size: 14px;
      color: var(--text-secondary); cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .btn-confirm {
      padding: 0 26px; height: 42px; border-radius: 8px; border: none;
      background: var(--brand-blue); font-family: var(--font-body); font-weight: 700; font-size: 14px;
      color: white; cursor: pointer; transition: background .15s;
    }
    .btn-confirm:hover { background: var(--brand-blue-dark); }
    .btn-confirm:disabled { cursor: default; }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo" role="img" aria-label="Mago do Pism"></div>
      <nav class="sidebar-nav">
        <a href="inicio.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg><span>Início</span></a>
        <a href="cursos.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg><span>Cursos</span></a>
        <a href="alunos.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Alunos</span></a>
        <a href="modulos.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Módulos</span></a>
        <a href="gravacoes.html" class="sidebar-item is-active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 8L16 12L22 16V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg><span>Gravações</span></a>
        <a href="equipe.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg><span>Equipe</span></a>
        <a href="avisos.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span>Avisos</span></a>
        <a href="simulados.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg><span>Simulados</span></a>
        <a href="nivelamentos.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Nivelamentos</span></a>
        <a href="listas.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span>Listas</span></a>
      </nav>
      <div class="sidebar-foot">
        <a href="perfil.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg><span>Meu Perfil</span></a>
      </div>
    </aside>

    <main class="content admin-content">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:32px;">
        <h2 class="section-title" style="margin:0;">Publicar Conteúdo</h2>
        <div style="margin-left:auto;display:flex;gap:10px;">
          <a href="gravacoes.html" style="display:inline-flex;align-items:center;gap:6px;padding:0 16px;height:38px;border-radius:8px;border:1px solid var(--border-default);background:var(--neutral-0);font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-secondary);">← Banco de Gravações</a>
        </div>
      </div>

      <form class="pub-layout" onsubmit="return mockPublish(event)">
        <div class="pub-preview-card">
          <div class="rec-thumb">
            <div class="rec-thumb-date" id="previewDate">—</div>
            <div class="rec-thumb-play"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
            <div class="rec-thumb-dur" id="previewDur">--:--</div>
          </div>
          <div class="pub-preview-body">
            <p class="pub-preview-title" id="previewTitulo">—</p>
            <div class="rec-meta">
              <span class="rec-tag blue" id="previewTurma">—</span>
              <span class="rec-tag draft">Rascunho</span>
            </div>
            <div class="rec-prof" id="previewProf">—</div>
          </div>
        </div>

        <div class="pub-form">
          <div class="pub-field">
            <label>Nome da aula (como aparecerá para alunos)</label>
            <input type="text" id="inputTitulo" />
          </div>
          <div class="pub-field">
            <label>Descrição</label>
            <textarea placeholder="Descreva o conteúdo abordado nesta aula…"></textarea>
          </div>
          <div class="pub-field">
            <label>Adicionar ao curso</label>
            <select><option>PISM I — T1</option><option>PISM I — T2</option><option>PISM II — T3</option><option>PISM/ENEM — T1</option></select>
          </div>
          <div class="pub-field">
            <label>Módulo</label>
            <select><option>Álgebra</option><option>Geometria</option><option>Funções</option><option>Trigonometria</option><option>Estatística</option></select>
          </div>
          <div class="pub-field">
            <label>Materiais complementares</label>
            <div class="attach-area">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              Arraste arquivos ou clique para anexar PDF, slides ou listas
            </div>
          </div>
          <div class="pub-field">
            <label>Visibilidade</label>
            <select><option>Disponível imediatamente</option><option>Agendar data de liberação</option></select>
          </div>

          <div class="pub-actions">
            <a href="gravacoes.html" class="btn-cancel">Cancelar</a>
            <button type="submit" class="btn-confirm" id="btnPublish">Publicar no curso</button>
          </div>
        </div>
      </form>
    </main>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var titulo = params.get('titulo') || 'Aula sem título';
    var turma = params.get('turma') || '—';
    var professor = params.get('professor') || '—';
    var data = params.get('data') || '—';
    var duracao = params.get('duracao') || '--:--';

    document.getElementById('previewDate').textContent = data.split(' · ')[0] || data;
    document.getElementById('previewDur').textContent = duracao;
    document.getElementById('previewTitulo').textContent = titulo;
    document.getElementById('previewTurma').textContent = turma;
    document.getElementById('previewProf').textContent = 'Prof. ' + professor + ' · ' + data;
    document.getElementById('inputTitulo').value = titulo;

    function mockPublish(event) {
      event.preventDefault();
      var btn = document.getElementById('btnPublish');
      btn.textContent = '✓ Publicado com sucesso';
      btn.disabled = true;
      btn.style.background = 'var(--color-success)';
      setTimeout(function () { window.location.href = 'gravacoes.html'; }, 1200);
      return false;
    }
  </script>
</body>
</html>
